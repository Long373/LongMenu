<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: transparent; font-family: -apple-system, sans-serif; overflow: hidden; }
#app-container { 
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100vw; 
    height: 100vh; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    pointer-events: none; /* Thêm cái này để có thể chạm xuyên qua phần trống */
}

#main-menu {
    pointer-events: auto;
            width: 300px; height: 300px; background: rgba(28, 28, 30, 0.98); 
            border: 1px solid #444; border-radius: 15px;
            display: flex; flex-direction: column; color: white; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); position: relative; overflow: hidden; 
        }

        @keyframes rainbow-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .disco-active {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab) !important;
            background-size: 400% 400% !important;
            animation: rainbow-bg 12s linear infinite !important;
        }

        @keyframes rb-text { 
            0% {color: #ff0000; fill: #ff0000;} 20% {color: #ff9900; fill: #ff9900;} 40% {color: #33dd44; fill: #33dd44;} 
            60% {color: #0088ff; fill: #0088ff;} 80% {color: #bb55ff; fill: #bb55ff;} 100% {color: #ff0000; fill: #ff0000;} 
        }

        .rainbow-active span, .rainbow-active b, .rainbow-active div, 
        .rainbow-active button, .rainbow-active input, .rainbow-active svg { 
            animation: rb-text 2s linear infinite; 
        }

        .icon-svg { width: 20px; height: 20px; fill: white; cursor: pointer; transition: 0.2s; }
        .icon-svg:hover { transform: scale(1.1); }
{ from {transform: rotate(0deg)} to {transform: rotate(360deg)} }

        .header { padding: 8px 10px; font-weight: bold; border-bottom: 0.5px solid #3a3a3c; font-size: 13px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; z-index: 10; }
        
        #settings-panel, #fav-panel {
            display: none; position: absolute; top: 38px; left: 0; width: 100%; height: calc(100% - 38px);
            background: #1c1c1e; z-index: 100; padding: 10px; border-radius: 0 0 15px 15px; overflow-y: auto; 
        }

        .main-scroll { flex: 1; overflow-y: auto; padding: 0 10px; -webkit-overflow-scrolling: touch; }
        .type-selector { padding: 4px; background: #2c2c2e; margin: 4px 5px; border-radius: 8px; flex-shrink: 0; }
        .type-scroll { display: flex; gap: 3px; }
        .type-btn { flex: 1; padding: 5px 0; border-radius: 6px; text-align: center; background: #3a3a3c; color: #8e8e93; font-size: 9px; border: none; font-weight: bold; }
        .type-btn.active { background: #0a84ff; color: white !important; }

        input[type="text"] { width: 100%; height: 26px; background: #111; border: 1px solid #444; color: #00fbff; border-radius: 6px; margin: 4px 0; text-align: center; font-size: 12px; }
        #result-count { font-size: 10px; color: #0a84ff; text-align: center; margin: 2px 0 5px 0; font-weight: bold; }
        .btn-row { display: flex; gap: 4px; margin-bottom: 5px; }
        button { flex: 1; height: 26px; border: none; border-radius: 6px; font-weight: bold; color: white; font-size: 10px; }
        .blue { background: #0a84ff; } .gray { background: #3a3a3c; } .orange { background: #ff9500; color: black !important; }

        .item-list { background: #000; border-radius: 8px; border: 1px solid #333; margin-bottom: 10px; }
        .item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #222; font-size: 11px; align-items: center; }
        
        .action-btns { display: flex; gap: 8px; margin-top: 5px; }
        .icon-btn { width: 45px; height: 35px; display: flex; justify-content: center; align-items: center; background: #2c2c2e; border: 1px solid #555; border-radius: 6px; transition: 0.3s; }

        .locked { background: #ff453a !important; border-color: #ff453a !important; } 
        .locked svg { fill: white !important; animation: none !important; } 

        .faved { background: #ffcc00 !important; border-color: #ffcc00 !important; } 
        .faved svg { fill: #000 !important; animation: none !important; } 
        
        .footer { padding: 4px; text-align: center; font-size: 8px; color: #555; border-top: 0.5px solid #333; flex-shrink: 0; }
        
        .color-stepper { display: flex; align-items: center; gap: 10px; background: #2c2c2e; padding: 2px 8px; border-radius: 6px; }
        .step-btn { width: 24px; height: 24px; background: #3a3a3c; border-radius: 4px; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 16px; }

function layout() {
    // Kiểm tra hướng thiết bị
    if (window.lastorientation == window.orientation) return;
    window.lastorientation = window.orientation;

    // Lấy kích thước màn hình thực tế
    var screenW = window.screen.width;
    var screenH = window.screen.height;

    if (Math.abs(window.orientation) == 90) {
        // Chế độ Ngang: Chiều rộng lúc này là Height của màn hình gốc
        setWindowRect(0, 0, screenH, screenW);
    } else {
        // Chế độ Dọc
        setWindowRect(0, 0, screenW, screenH);
    }
}

// Gọi hàm layout ngay khi load trang
layout();

// Lắng nghe sự kiện xoay màn hình

    var currentColorIdx = 0;

    function stepColor(dir) {
        currentColorIdx = (currentColorIdx + dir + colorList.length) % colorList.length;
        document.getElementById('colorName').innerText = colorList[currentColorIdx].name;
        document.getElementById('main-menu').style.backgroundColor = colorList[currentColorIdx].color;
    }

    function applyRainbow() {
        document.getElementById('main-menu').classList.toggle('rainbow-active', document.getElementById('rbToggle').checked);
    }

    function applyDisco() {
        var isChecked = document.getElementById('discoToggle').checked;
        var menu = document.getElementById('main-menu');
        menu.classList.toggle('disco-active', isChecked);
        if(!isChecked) menu.style.backgroundColor = colorList[currentColorIdx].color;
    }

    function togglePanel(id) {
        var p = document.getElementById(id);
        var isVisible = (p.style.display === 'block');
        document.getElementById('settings-panel').style.display = 'none';
        document.getElementById('fav-panel').style.display = 'none';
        if(!isVisible) { p.style.display = 'block'; if(id === 'fav-panel') renderFavs(); }
    }

    function saveSettings() {
        let s = document.getElementById('setMemStart').value;
        let e = document.getElementById('setMemEnd').value;
        rangeStart = s.startsWith('0x') ? s : '0x' + s;
        rangeEnd = e.startsWith('0x') ? e : '0x' + e;
        localStorage.setItem('memStart', rangeStart);
        localStorage.setItem('memEnd', rangeEnd);
        togglePanel('settings-panel');
    }

    function doSearch(isRefine) {
        var v = document.getElementById('ipt').value; if(!v) return;
        if(!isRefine) h5gg.clearResults();
        h5gg.searchNumber(v, cur_t, rangeStart, rangeEnd);
        render();
    }

    function setT(t, e) {
        cur_t = t;
        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        e.classList.add('active');
    }

    function createItem(addr, val, type, isL, isF) {
        var displayAddr = "0x" + parseInt(addr).toString(16).toUpperCase();
        return `<div class="item" onclick="selectRow('${addr}', '${val}', '${type}', this)">
            <div>
                <span style="font-size:8px; color:#5ac8fa; font-weight:bold">${type}</span>
                <span style="color:#8e8e93; font-size:9px">${displayAddr.slice(-10)}</span>
                <div class="action-btns">
                    <div class="icon-btn ${isL?'locked':''}" onclick="toggleLock('${addr}', '${val}', '${type}', event)">${isL?svgLock:svgUnlock}</div>
                    <div class="icon-btn ${isF?'faved':''}" onclick="toggleFav('${addr}', '${val}', '${type}', event)">${svgStar}</div>
                </div>
            </div>
            <b style="color:#32d74b; font-size:13px">${val}</b>
        </div>`;
    }

    function render() {
        var res = h5gg.getResults(30); var h = "";
        document.getElementById('result-count').innerText = "Tìm thấy: " + h5gg.getResultsCount();
        for(var i=0; i<res.length; i++) {
            h += createItem(res[i].address, lockList[res[i].address] ? lockList[res[i].address].value : res[i].value, res[i].type, !!lockList[res[i].address], !!favList[res[i].address]);
        }
        document.getElementById('res-list').innerHTML = h;
        document.getElementById('edit-panel').style.display = res.length > 0 ? 'block' : 'none';
    }

    function renderFavs() {
        var h = "";
        for(var a in favList) h += createItem(a, lockList[a] ? lockList[a].value : favList[a].value, favList[a].type, !!lockList[a], true);
        document.getElementById('fav-list-body').innerHTML = h || "<div style='text-align:center;padding:15px;color:#555;'>Trống</div>";
    }

    function selectRow(addr, val, type, el) {
        selectedAddr = addr; selectedType = type;
        document.getElementById('new_v').value = val;
        document.getElementById('fav_edit_val').value = val;
        document.querySelectorAll('.item').forEach(i => i.style.background = 'none');
        el.style.background = 'rgba(10, 132, 255, 0.2)';
    }

    function toggleLock(addr, val, type, event) {
        event.stopPropagation();
        if(lockList[addr]) delete lockList[addr];
        else {
            lockList[addr] = { value: val, type: type };
            if(!globalTimer) globalTimer = setInterval(() => { for(var a in lockList) h5gg.setValue(a, lockList[a].value, lockList[a].type); }, 200);
        }
        render(); if(document.getElementById('fav-panel').style.display === 'block') renderFavs();
    }

    function toggleFav(addr, val, type, event) {
        event.stopPropagation();
        if(favList[addr]) delete favList[addr]; else favList[addr] = { value: val, type: type };
        render(); if(document.getElementById('fav-panel').style.display === 'block') renderFavs();
    }

    function editInFav() {
        var v = document.getElementById('fav_edit_val').value;
        if(v && selectedAddr) { h5gg.setValue(selectedAddr, v, selectedType); renderFavs(); render(); }
    }

    function editSelected() {
        var v = document.getElementById('new_v').value;
        if(v && selectedAddr) { h5gg.setValue(selectedAddr, v, selectedType); render(); }
    }

    function editAll() {
        var v = document.getElementById('new_v').value; if(v) h5gg.editAll(v, cur_t); render();
    }

    function resetAll() {
        h5gg.clearResults();

document.getElementById('res-list').innerHTML = "";
        document.getElementById('edit-panel').style.display = 'none';
        document.getElementById('result-count').innerText = "";
    }
document.addEventListener("copy", function(e) {
e.preventDefault();
});

document.addEventListener("cut", function(e) {
e.preventDefault();
});

document.addEventListener("contextmenu", function(e) {
e.preventDefault();
});

document.body.style.webkitUserSelect = "none";
document.body.style.userSelect = "none";
        /địt mẹ mày copy làm chó/
</script>
