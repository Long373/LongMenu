<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: transparent; font-family: -apple-system, sans-serif; overflow: hidden; }
        
#app-container { 
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100vw; 
    height: 100vh; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    pointer-events: none; /* Thêm cái này để có thể chạm xuyên qua phần trống */
}

#main-menu {
    pointer-events: auto;            width: 300px; 
            height: 270px; 
            background: #1c1c1e; border: 2px solid #3a3a3c; border-radius: 20px;
            display: flex; flex-direction: column; color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative; overflow: hidden;
        }

        /* Rainbow Effect */
        @keyframes rainbow {
            0% { border-color: #ff0000; }
            25% { border-color: #32d74b; }
            50% { border-color: #0a84ff; }
            75% { border-color: #ff9500; }
            100% { border-color: #ff0000; }
        }
        .rainbow-active { animation: rainbow 2s linear infinite; }

        .header { 
            padding: 10px; font-weight: bold; border-bottom: 0.5px solid #3a3a3c; 
            font-size: 15px; color: #0a84ff; display: flex; justify-content: space-between; align-items: center;
            flex-shrink: 0;
        }
        
        .settings-icon { cursor: pointer; font-size: 16px; color: #8e8e93; }

        #settings-panel {
            display: none; background: #2c2c2e; margin: 5px 8px; padding: 8px; 
            border-radius: 12px; border: 1px solid #3a3a3c; flex-shrink: 0;
        }

        .type-selector { padding: 6px; background: #2c2c2e; margin: 8px; border-radius: 12px; flex-shrink: 0; }
        .type-scroll { display: flex; gap: 5px; }

        .type-btn {
            flex: 1; padding: 6px 0; border-radius: 8px; text-align: center;
            background: #3a3a3c; color: #8e8e93; font-size: 11px; font-weight: 600;
        }
        .type-btn.active { background: #0a84ff; color: white; }

        /* Khu vực này sẽ tự cuộn nếu nội dung quá dài bên trong khung đã khóa */
        .scroll-area { padding: 0 12px 10px 12px; overflow-y: auto; flex: 1; }

        .option-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 12px; }
        
        .switch { position: relative; display: inline-block; width: 32px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #3a3a3c; transition: .3s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #32d74b; }
        input:checked + .slider:before { transform: translateX(14px); }

        input[type="text"] { 
            width: 100%; height: 38px; background: #2c2c2e; border: 1px solid #3a3a3c; color: #00fbff; 
            border-radius: 10px; margin-bottom: 8px; text-align: center; font-size: 15px; font-weight: bold;
        }

        .btn-row { display: flex; gap: 6px; margin-bottom: 6px; }
        button { flex: 1; height: 36px; border: none; border-radius: 10px; font-weight: 600; color: white; font-size: 11px; }
        button:active { opacity: 0.7; }

        .blue { background: #0a84ff; }
        .gray { background: #3a3a3c; }
        .green { background: #32d74b; color: #000; }
        .red { background: #ff453a; }
        .orange { background: #ff9500; color: #000; }

        #res-list { 
            max-height: 120px; overflow-y: auto; background: #000; 
            border-radius: 10px; border: 1px solid #333; margin-top: 5px; display: none;
        }
        .item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #222; font-size: 11px; }
        .item.selected { background: rgba(10, 132, 255, 0.2); border-left: 3px solid #0a84ff; }

        .status { text-align: center; font-size: 11px; color: #8e8e93; margin: 5px 0; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="main-menu">
        <div class="header">
            <span style="visibility: hidden;">⚙️</span>
            <span>Memory Editer Pro </span>
            <span class="settings-icon" onclick="toggleSettings()">⚙️</span>
        </div>
        
        <div id="settings-panel">
            <div class="option-row">
                <span>Hiện bảng kết quả</span>
                <label class="switch">
                    <input type="checkbox" id="masterToggle" checked onchange="updateUI()">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="option-row">
                <span>Rainbow Menu </span>
                <label class="switch">
                    <input type="checkbox" id="rainbowToggle" onchange="toggleRainbow()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="type-selector">
            <div class="type-scroll">
                <div class="type-btn active" onclick="setT('F64', this)">Double</div>
                <div class="type-btn" onclick="setT('F32', this)">Float</div>
                <div class="type-btn" onclick="setT('I64', this)">Int64</div>
                <div class="type-btn" onclick="setT('I32', this)">Int32</div>
            </div>
        </div>

        <div class="scroll-area">
            <input type="text" id="ipt" placeholder="Nhập giá trị...">
            
            <div class="btn-row">
                <button class="blue" onclick="doSearch(false)">TÌM MỚI</button>
                <button class="gray" onclick="doSearch(true)">LỌC TIẾP</button>
            </div>

            <div id="edit-panel" style="display:none">
                <input type="text" id="new_v" placeholder="Giá trị sửa...">
                <div class="btn-row">
                    <button class="orange" onclick="editSelected()">SỬA CHỌN</button>
                    <button class="green" onclick="editAll()">SỬA HẾT</button>
                </div>
                <div class="btn-row">
                    <button class="red" onclick="lock()">KHÓA 🔒</button>
                    <button class="gray" onclick="unlock()">MỞ 🔓</button>
                </div>
            </div>

            <div id="res-list"></div>
            <div class="status" id="msg">Sẵn sàng</div>
            <button class="gray" style="height: 30px; font-size: 10px; color:#ff453a; width:100%; margin-top: 5px;" onclick="resetAll()">RESET ENGINE</button>
        </div>
    </div>
</div>

<script>
// Hàm điều chỉnh kích thước cửa sổ H5GG để luôn full màn hình
function layout() {
    // Kiểm tra hướng thiết bị
    if (window.lastorientation == window.orientation) return;
    window.lastorientation = window.orientation;

    // Lấy kích thước màn hình thực tế
    var screenW = window.screen.width;
    var screenH = window.screen.height;

    if (Math.abs(window.orientation) == 90) {
        // Chế độ Ngang: Chiều rộng lúc này là Height của màn hình gốc
        setWindowRect(0, 0, screenH, screenW);
    } else {
        // Chế độ Dọc
        setWindowRect(0, 0, screenW, screenH);
    }
}

// Gọi hàm layout ngay khi load trang
layout();

// Lắng nghe sự kiện xoay màn hình
window.addEventListener("orientationchange", layout, false);

// Thiết lập vùng kéo (nếu bạn muốn tiêu đề header có thể nắm kéo)
// Ở đây ta set mặc định là không cho kéo toàn màn hình để tránh lỗi
setWindowDrag(0, 0, 0, 0);
const style = document.createElement('style');
style.innerHTML = `
    * { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
    input, textarea { -webkit-user-select: text; user-select: text; }
`;
document.head.appendChild(style);

const isInput = (el) => ['INPUT', 'TEXTAREA'].includes(el.tagName) || el.isContentEditable;

document.addEventListener('contextmenu', e => { if (!isInput(e.target)) e.preventDefault(); });
document.addEventListener('selectstart', e => { if (!isInput(e.target)) e.preventDefault(); });
document.addEventListener('copy', e => { if (!isInput(e.target)) e.preventDefault(); });

document.onkeydown = e => {
    if (isInput(e.target) && !e.ctrlKey) return true;
    if (e.keyCode == 123 || 
        (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode)) || 
        (e.ctrlKey && [85, 83, 67, 65].includes(e.keyCode))) {
        return false;
    }
};
    var cur_t = 'F64';
    var timer = null;
    var selectedAddr = null;

    function toggleSettings() {
        var panel = document.getElementById('settings-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function toggleRainbow() {
        var menu = document.getElementById('main-menu');
        if(document.getElementById('rainbowToggle').checked) menu.classList.add('rainbow-active');
        else menu.classList.remove('rainbow-active');
    }

    function updateUI() {
        var isShow = document.getElementById('masterToggle').checked;
        var resList = document.getElementById('res-list');
        resList.style.display = (isShow && h5gg.getResultsCount() > 0) ? 'block' : 'none';
    }

    function setT(t, e) {
        cur_t = t;
        var btns = document.getElementsByClassName('type-btn');
        for(var i=0; i<btns.length; i++) btns[i].classList.remove('active');
        e.classList.add('active');
    }

    function selectRow(addr, val, el) {
        selectedAddr = addr;
        document.getElementById('new_v').value = val;
        var items = document.getElementsByClassName('item');
        for(var i=0; i<items.length; i++) items[i].classList.remove('selected');
        el.classList.add('selected');
    }

    function doSearch(isRefine) {
        var v = document.getElementById('ipt').value;
        if(!v) return;
        if(!isRefine) h5gg.clearResults();
        try {
            h5gg.searchNumber(v, cur_t, '0x0', '0x200000000');
            var c = h5gg.getResultsCount();
            document.getElementById('msg').innerText = "Kết quả: " + c;
            if(c > 0) {
                document.getElementById('edit-panel').style.display = 'block';
                render();
            }
        } catch(e) {}
    }

    function render() {
        var c = h5gg.getResultsCount();
        if(c <= 0) return;
        var res = h5gg.getResults(c > 50 ? 50 : c);
        var h = "";
        for(var i=0; i<res.length; i++) {
            h += "<div class='item' onclick='selectRow(\""+res[i].address+"\", \""+res[i].value+"\", this)'>" +
                 "<span>0x"+res[i].address.toString(16).toUpperCase().slice(-8)+"</span>" +
                 "<span style='color:#32d74b; font-weight:bold;'>"+res[i].value+"</span></div>";
        }
        document.getElementById('res-list').innerHTML = h;
        updateUI();
    }

    function editSelected() {
        var v = document.getElementById('new_v').value;
        if(!v || !selectedAddr) return;
        h5gg.setValue(selectedAddr, v, cur_t);
        render(); 
    }

    function editAll() {
        var v = document.getElementById('new_v').value;
        if(!v) return;
        var res = h5gg.getResults(h5gg.getResultsCount());
        for(var i=0; i<res.length; i++) h5gg.setValue(res[i].address, v, res[i].type);
        render(); 
    }

    function lock() {
        var v = document.getElementById('new_v').value;
        if(!v) return;
        unlock();
        var res = h5gg.getResults(h5gg.getResultsCount());
        timer = setInterval(function() {
            for(var i=0; i<res.length; i++) h5gg.setValue(res[i].address, v, res[i].type);
        }, 500);
        document.getElementById('msg').innerText = "ĐANG KHÓA: " + v;
        document.getElementById('msg').style.color = "#ff453a";
    }

    function unlock() {
        if(timer) clearInterval(timer);
        document.getElementById('msg').style.color = "#8e8e93";
        document.getElementById('msg').innerText = "Kết quả: " + h5gg.getResultsCount();
    }

    function resetAll() {
        unlock();
        h5gg.clearResults();
        selectedAddr = null;
        document.getElementById('edit-panel').style.display = 'none';
        document.getElementById('res-list').style.display = 'none';
        document.getElementById('msg').innerText = "Sẵn sàng";
    }
</script>
</body>
</html>
